name: Playwright Tests

# DIA 25 - Reports e CI com Playwright
# Roda a suite a cada push/PR e publica o HTML report como artifact.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: E2E - Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: playwright-fase2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwright-fase2/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores do Playwright
        run: npx playwright install --with-deps

      - name: Rodar testes (headless)
        run: npx playwright test

      # Publica o relatorio mesmo se os testes falharem.
      - name: Upload do HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-fase2/playwright-report/
          retention-days: 14
